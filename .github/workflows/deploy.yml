name: CI/CD - Deploy to EC2
on:
  push:
    branches: [ main ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ms-guias-despacho:latest

      - name: Deploy en EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ms-guias-despacho:latest
            docker stop ms-guias-despacho || true
            docker rm ms-guias-despacho || true
            docker run -d \
              --name ms-guias-despacho \
              -p 8080:8080 \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }} \
              -e AWS_DEFAULT_REGION=us-east-1 \
              ${{ secrets.DOCKERHUB_USERNAME }}/ms-guias-despacho:latest
            echo "✅ Deploy completado"
            
            # ⚠️ DESCOMENTAR cuando Azure AD esté configurado:
            # -e AZURE_TENANT_NAME=${{ secrets.AZURE_TENANT_NAME }} \
            # -e AZURE_USER_FLOW=${{ secrets.AZURE_USER_FLOW }} \
            # -e AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }} \
            
            # ⚠️ DESCOMENTAR cuando EFS esté montado:
            # -v /mnt/efs:/app/efs \
