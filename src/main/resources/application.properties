spring.application.name=ms-administracion-archivos
server.port=8080

# ============================================================
# AWS S3
# ============================================================
aws.s3.bucket=sgdemob
aws.region=us-east-1

# ============================================================
# EFS (almacenamiento temporal)
# ============================================================
efs.path=/app/efs

# ============================================================
# Azure AD B2C - OAuth2 Resource Server
#
# Reemplaza estas variables de entorno (o sus valores por defecto)
# con los datos reales de tu tenant Azure AD B2C:
#
#   AZURE_TENANT_NAME  -> nombre del tenant (ej: miempresa)
#   AZURE_USER_FLOW    -> nombre del user flow (ej: B2C_1_signupsignin)
#   AZURE_CLIENT_ID    -> Application (client) ID de la app registrada
# ============================================================
azure.tenant-name=${AZURE_TENANT_NAME:miempresa}
azure.user-flow=${AZURE_USER_FLOW:B2C_1_signupsignin}
azure.client-id=${AZURE_CLIENT_ID:xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx}

spring.security.oauth2.resourceserver.jwt.issuer-uri=https://${azure.tenant-name}.b2clogin.com/${azure.tenant-name}.onmicrosoft.com/${azure.user-flow}/v2.0
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://${azure.tenant-name}.b2clogin.com/${azure.tenant-name}.onmicrosoft.com/${azure.user-flow}/discovery/v2.0/keys

# ============================================================
# Multipart
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# Logging
# ============================================================
logging.level.software.amazon.awssdk=WARN
logging.level.sistemadegestion=INFO
logging.level.org.springframework.security=INFO
